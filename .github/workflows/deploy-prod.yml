# Deploy to production (beachleaguevb.com)
# Manual trigger only — builds images in CI, pushes to GHCR, prod pulls pre-built images.
name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"
        type: string
      skip_build:
        description: "Skip image build (use existing GHCR images)"
        required: false
        default: false
        type: boolean

permissions:
  packages: write

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  build-and-push:
    if: ${{ !inputs.skip_build }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ghcr.io/pschwagler/beach-kings/frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ vars.NEXT_PUBLIC_MAPBOX_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ghcr.io/pschwagler/beach-kings/backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ always() && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') }}
    steps:
      - name: Deploy to prod EC2
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_BRANCH: ${{ inputs.branch }}
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          command_timeout: 10m
          envs: DEPLOY_BRANCH
          script: |
            set -e
            cd ~/beach-kings

            echo "=== Fetching branch: $DEPLOY_BRANCH ==="
            git fetch --all
            git checkout "$DEPLOY_BRANCH"
            git pull origin "$DEPLOY_BRANCH"

            echo "=== Pulling pre-built images ==="
            docker-compose pull frontend backend

            echo "=== Starting containers ==="
            docker-compose up -d

            echo "=== Waiting for services to start ==="
            sleep 15

            echo "=== Health checks ==="
            # Backend health check
            backend_healthy=false
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
                echo "Backend is healthy"
                backend_healthy=true
                break
              fi
              echo "  Waiting for backend... (attempt $i/12)"
              sleep 5
            done
            if [ "$backend_healthy" = false ]; then
              echo "Backend failed to become healthy"
              exit 1
            fi

            # Frontend health check
            frontend_healthy=false
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3000 > /dev/null 2>&1; then
                echo "Frontend is healthy"
                frontend_healthy=true
                break
              fi
              echo "  Waiting for frontend... (attempt $i/12)"
              sleep 5
            done
            if [ "$frontend_healthy" = false ]; then
              echo "Frontend failed to become healthy"
              exit 1
            fi

            echo "=== Cleaning up old images ==="
            docker system prune -af || true

            echo ""
            echo "=== Deploy complete ==="
            echo "https://beachleaguevb.com"
            echo "Branch: $DEPLOY_BRANCH"
