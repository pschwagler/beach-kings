<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<link rel="stylesheet" href="shared.css">
<title>Change Password - Beach League Mobile</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>

  .content { padding: 24px 16px 100px; }

  /* Form */
  .form-group { margin-bottom: 20px; }
  .form-label { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
  .form-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1.5px solid #e0e0e0; font-size: 15px; background: #fff; color: #1a1a1a; }
  .form-input:focus { outline: none; border-color: #2a7d9c; }
  .form-input::placeholder { color: #bbb; }
  .form-input.error { border-color: #ef4444; }
  .form-hint { font-size: 11px; color: #666; margin-top: 4px; }
  .error-text { font-size: 12px; color: #ef4444; margin-top: 4px; display: none; }

  .btn-save { display: block; width: 100%; padding: 16px; border-radius: 12px; border: none; background: #d4a843; color: #fff; font-size: 16px; font-weight: 700; text-align: center; margin-top: 24px; cursor: pointer; min-height: 44px; }

  /* Success Banner */
  .success-banner { display: none; padding: 12px 16px; background: #dcfce7; border-radius: 10px; margin-bottom: 20px; font-size: 14px; color: #15803d; font-weight: 600; text-align: center; }

  /* Error Banner */
  .error-banner { display: none; padding: 12px 16px; background: #fee2e2; border-radius: 10px; margin-bottom: 20px; font-size: 14px; color: #b91c1c; font-weight: 600; text-align: center; }

  /* State management */
  body.error-state .error-banner { display: block; }
  body.error-state .form-input.pw-current { border-color: #ef4444; }
  body.error-state .error-text.pw-mismatch { display: block; }
  body.success-state .success-banner { display: block; }

</style>
</head>
<body>

<!-- State Switcher -->
<div class="state-switcher">
  <div class="sw-label">Change Password</div>
  <div class="sw-pills">
    <button class="sw-pill active" onclick="setState('default')">Default</button>
    <button class="sw-pill" onclick="setState('error')">Wrong Password</button>
    <button class="sw-pill" onclick="setState('success')">Success</button>
  </div>
</div>

<div class="status-bar">
  <span>9:41</span>
  <span style="font-size: 11px; font-weight: 400;">* * *</span>
</div>

<div class="top-nav">
  <a href="settings-account.html" class="back">&larr; Account</a>
  <div class="title">Change Password</div>
  <div class="spacer"></div>
</div>

<div class="content">

  <div class="success-banner">Password updated successfully.</div>
  <div class="error-banner">Current password is incorrect.</div>

  <div class="form-group">
    <div class="form-label">Current Password</div>
    <input class="form-input pw-current" type="password" placeholder="Enter current password" />
    <div class="error-text pw-mismatch">Incorrect password. Please try again.</div>
  </div>

  <div class="form-group">
    <div class="form-label">New Password</div>
    <input class="form-input" type="password" placeholder="Enter new password" />
    <div class="form-hint">At least 8 characters</div>
  </div>

  <div class="form-group">
    <div class="form-label">Confirm New Password</div>
    <input class="form-input" type="password" placeholder="Re-enter new password" />
  </div>

  <button class="btn-save" onclick="setState('success')">Update Password</button>

</div>

<div class="tab-bar">
  <a href="home.html" class="tab" style="text-decoration:none;">
    <div class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1m-2 0h2"/></svg></div>
    <div class="tab-label">Home</div>
  </a>
  <a href="leagues-tab.html" class="tab" style="text-decoration:none;">
    <div class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 14.66v1.626a2 2 0 0 1-.976 1.696A5 5 0 0 0 7 21.978"/><path d="M14 14.66v1.626a2 2 0 0 0 .976 1.696A5 5 0 0 1 17 21.978"/><path d="M18 9h1.5a1 1 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M6 9a6 6 0 0 0 12 0V3a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1z"/><path d="M6 9H4.5a1 1 0 0 1 0-5H6"/></svg></div>
    <div class="tab-label">Leagues</div>
  </a>
  <a href="add-games.html" class="tab add-games" style="text-decoration:none;">
    <div class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14m-7-7h14"/></svg></div>
    <div class="tab-label">Add Games</div>
  </a>
  <a href="messages.html" class="tab" style="text-decoration:none;">
    <div class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg></div>
    <div class="tab-badge">2</div>
    <div class="tab-label">Social</div>
  </a>
  <a href="profile.html" class="tab" style="text-decoration:none;">
    <div class="tab-icon active"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zm-4 7a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></div>
    <div class="tab-label active">Profile</div>
  </a>
</div>

<script>
  function setState(state) {
    document.body.classList.remove('error-state', 'success-state');
    document.querySelectorAll('.sw-pill').forEach(p => p.classList.remove('active'));
    if (state === 'error') {
      document.body.classList.add('error-state');
      document.querySelectorAll('.sw-pill')[1].classList.add('active');
    } else if (state === 'success') {
      document.body.classList.add('success-state');
      document.querySelectorAll('.sw-pill')[2].classList.add('active');
    } else {
      document.querySelectorAll('.sw-pill')[0].classList.add('active');
    }
  }
</script>

<script src="dark-theme-toggle.js"></script>
</body>
</html>
