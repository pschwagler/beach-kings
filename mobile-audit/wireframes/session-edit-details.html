<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<link rel="stylesheet" href="shared.css">
<title>Edit Session Details - Beach League Mobile</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>

  /* Modal Nav */
  .modal-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #1a3a4a; }
  .modal-nav .close { color: #fff; font-size: 22px; min-width: 44px; min-height: 44px; display: flex; align-items: center; background: none; border: none; cursor: pointer; }
  .modal-nav .title { color: #fff; font-size: 17px; font-weight: 700; }
  .modal-nav .spacer { min-width: 44px; }

  .content { padding: 16px 16px 120px; }

  .section-title { font-size: 15px; font-weight: 700; margin: 16px 0 10px; }
  .section-title:first-child { margin-top: 0; }

  /* Form sections — reuse shared.css .form-section / .form-row patterns */
  .form-section { background: #fff; border-radius: 12px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .form-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid #f0f0f0; min-height: 48px; }
  .form-row:last-child { border-bottom: none; }
  .form-label { font-size: 14px; color: #555; }
  .form-value { font-size: 14px; font-weight: 600; color: #1a1a1a; display: flex; align-items: center; gap: 6px; }
  .form-value .chevron { color: #ccc; font-size: 16px; }

  /* Text input inside form row */
  .form-input {
    flex: 1;
    text-align: right;
    border: none;
    outline: none;
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
    background: transparent;
    font-family: inherit;
    min-height: 24px;
  }
  .form-input::placeholder { color: #ccc; }

  /* Court card */
  .court-card { display: flex; align-items: center; gap: 10px; padding: 14px 16px; min-height: 48px; text-decoration: none; color: inherit; }
  .court-icon { font-size: 22px; }
  .court-info { flex: 1; }
  .court-name { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .court-detail { font-size: 12px; color: #555; margin-top: 2px; }
  .court-card .chevron { color: #ccc; font-size: 16px; }

  /* Session type pills */
  .type-pills { display: flex; gap: 8px; padding: 14px 16px; }
  .type-pill {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1.5px solid #e0e0e0;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: #666;
    min-height: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    gap: 3px;
  }
  .type-pill.active { border-color: #1a3a4a; background: #e8f4f8; color: #1a3a4a; }
  .type-pill-sub { font-size: 11px; font-weight: 400; color: #999; }
  .type-pill.active .type-pill-sub { color: #2a7d9c; }

  /* Notes textarea */
  .notes-area {
    width: 100%;
    box-sizing: border-box;
    border: none;
    outline: none;
    resize: none;
    font-size: 14px;
    color: #1a1a1a;
    padding: 14px 16px;
    min-height: 72px;
    font-family: inherit;
    background: transparent;
  }
  .notes-area::placeholder { color: #bbb; }

  /* Bottom bar */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 390px;
    background: #fff;
    border-top: 1px solid #eee;
    padding: 12px 16px 36px;
  }
  .btn-save {
    display: block;
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: #d4a843;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    cursor: pointer;
  }

</style>
</head>
<body>

<div class="status-bar">
  <span>9:41</span>
  <span style="font-size: 11px; font-weight: 400;">* * *</span>
</div>

<div class="modal-nav">
  <button class="close" onclick="window.location.href='session-active.html'">&times;</button>
  <div class="title">Edit Session</div>
  <div class="spacer"></div>
</div>

<div class="content">

  <!-- Session Name -->
  <div class="section-title">Session Name</div>
  <div class="form-section">
    <div class="form-row">
      <input class="form-input" type="text" value="Sunday at QBK" style="text-align: left;">
    </div>
  </div>

  <!-- Date & Time -->
  <div class="section-title">Date &amp; Time</div>
  <div class="form-section">
    <div class="form-row">
      <span class="form-label">Date</span>
      <span class="form-value">Sun, Apr 8, 2026 <span class="chevron">&rsaquo;</span></span>
    </div>
    <div class="form-row">
      <span class="form-label">Start Time</span>
      <span class="form-value">8:00 AM <span class="chevron">&rsaquo;</span></span>
    </div>
  </div>

  <!-- Location -->
  <div class="section-title">Location</div>
  <div class="form-section">
    <a href="javascript:void(0)" class="court-card" onclick="alert('Open court picker')">
      <div class="court-icon"><svg style="display:inline-block;vertical-align:middle" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="14" rx="2"/><line x1="12" y1="6" x2="12" y2="20"/><line x1="2" y1="13" x2="22" y2="13"/></svg></div>
      <div class="court-info">
        <div class="court-name">QBK Sports</div>
        <div class="court-detail">Queens Beach Kings Park</div>
      </div>
      <div class="chevron">&rsaquo;</div>
    </a>
  </div>

  <!-- Session Type -->
  <div class="section-title">Session Type</div>
  <div class="form-section">
    <div class="type-pills">
      <div class="type-pill active" id="pill-pickup" onclick="selectType('pickup')">
        Pickup
        <span class="type-pill-sub">Anyone can join</span>
      </div>
      <div class="type-pill" id="pill-league" onclick="selectType('league')">
        League
        <span class="type-pill-sub">Members only</span>
      </div>
    </div>
  </div>

  <!-- Notes -->
  <div class="section-title">Notes</div>
  <div class="form-section">
    <textarea class="notes-area" placeholder="Add session notes (optional)...">Bring sunscreen. We have courts 1-2 reserved until noon.</textarea>
  </div>

</div>

<div class="bottom-bar">
  <button class="btn-save" onclick="window.location.href='session-active.html'">Save Changes</button>
</div>

<script>
  function selectType(type) {
    document.getElementById('pill-pickup').classList.toggle('active', type === 'pickup');
    document.getElementById('pill-league').classList.toggle('active', type === 'league');
  }
</script>
<script src="dark-theme-toggle.js"></script>
</body>
</html>
