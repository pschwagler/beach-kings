<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<link rel="stylesheet" href="shared.css">
<title>Log In - Beach League</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>




  .content { padding: 32px 24px; }

  /* Logo */
  .logo-area { text-align: center; margin-bottom: 32px; }
  .logo-crown { font-size: 40px; color: #d4a843; }
  .logo-text { font-size: 20px; font-weight: 800; letter-spacing: 1.5px; color: #1a3a4a; margin-top: 4px; }

  /* Form */
  .form-group { margin-bottom: 18px; }
  .form-label { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
  .form-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1.5px solid #e0e0e0; font-size: 15px; background: #fff; color: #1a1a1a; }
  .form-input:focus { outline: none; border-color: #2a7d9c; }
  .form-input::placeholder { color: #bbb; }
  .form-input.error { border-color: #ef4444; }

  .btn-login { display: block; width: 100%; padding: 16px; border-radius: 12px; border: none; background: #d4a843; color: #fff; font-size: 16px; font-weight: 700; text-align: center; margin-top: 24px; }

  .forgot-link { font-size: 13px; color: #2a7d9c; text-align: right; display: block; margin-top: 8px; text-decoration: none; }

  /* Divider */
  .divider { display: flex; align-items: center; gap: 12px; margin: 28px 0; }
  .divider-line { flex: 1; height: 1px; background: #e0e0e0; }
  .divider-text { font-size: 12px; color: #666; font-weight: 500; }

  /* Social Buttons */
  .social-btns { display: flex; flex-direction: column; gap: 12px; }
  .btn-social { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #e0e0e0; background: #fff; font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .btn-social .social-icon { font-size: 18px; }
  .btn-social.google { }
  .btn-social.apple { background: #000; color: #fff; border-color: #000; }

  /* Footer */
  .signup-prompt { text-align: center; margin-top: 28px; font-size: 14px; color: #666; }
  .signup-prompt a { color: #2a7d9c; font-weight: 600; text-decoration: none; }

  /* Error Banner */
  .error-banner { display: none; padding: 12px 16px; background: #fee2e2; border-radius: 10px; margin-bottom: 20px; font-size: 14px; color: #b91c1c; font-weight: 600; text-align: center; }

  /* Error state */
  body.login-error .error-banner { display: block; }
  body.login-error .form-input { border-color: #ef4444; }
</style>
</head>
<body>

<!-- State Switcher -->
<div class="state-switcher">
  <div class="sw-label">Log In</div>
  <div class="sw-pills">
    <button class="sw-pill active" onclick="setState('default')">Default</button>
    <button class="sw-pill" onclick="setState('error')">Invalid Credentials</button>
  </div>
</div>

<div class="status-bar">
  <span>9:41</span>
  <span style="font-size: 11px; font-weight: 400;">* * *</span>
</div>

<div class="top-nav">
  <a href="welcome.html" class="back">&larr;</a>
  <div class="title">Log In</div>
  <div class="spacer"></div>
</div>

<div class="content">

  <div class="logo-area">
    <div class="logo-crown"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm0 2h14v2H5v-2z"/></svg></div>
    <div class="logo-text">BEACH LEAGUE</div>
  </div>

  <div class="error-banner">Invalid email or password. Please try again.</div>

  <div class="form-group">
    <div class="form-label">Email</div>
    <input class="form-input" type="email" placeholder="you@example.com" />
  </div>

  <div class="form-group">
    <div class="form-label">Password</div>
    <input class="form-input" type="password" placeholder="Enter your password" />
  </div>

  <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>

  <button class="btn-login" onclick="window.location.href='home.html'">Log In</button>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">OR</span>
    <div class="divider-line"></div>
  </div>

  <div class="social-btns">
    <button class="btn-social google" onclick="window.location.href='home.html'">
      <span class="social-icon">G</span>
      Continue with Google
    </button>
    <button class="btn-social apple" onclick="window.location.href='home.html'">
      <span class="social-icon">&#63743;</span>
      Continue with Apple
    </button>
  </div>

  <div class="signup-prompt">
    Don't have an account? <a href="signup.html">Sign Up</a>
  </div>

</div>

<script>
  function setState(state) {
    document.body.classList.remove('login-error');
    document.querySelectorAll('.sw-pill').forEach(p => p.classList.remove('active'));
    if (state === 'error') {
      document.body.classList.add('login-error');
      document.querySelectorAll('.sw-pill')[1].classList.add('active');
    } else {
      document.querySelectorAll('.sw-pill')[0].classList.add('active');
    }
  }
</script>

<script src="dark-theme-toggle.js"></script>
</body>
</html>
