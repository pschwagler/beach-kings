<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<link rel="stylesheet" href="shared.css">
<title>Sign Up - Beach League</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>




  .content { padding: 24px 24px 40px; }

  /* Logo */
  .logo-area { text-align: center; margin-bottom: 24px; }
  .logo-crown { font-size: 40px; color: #d4a843; }
  .logo-subtitle { font-size: 14px; color: #666; margin-top: 4px; }

  /* Form */
  .form-row { display: flex; gap: 12px; }
  .form-group { margin-bottom: 16px; flex: 1; }
  .form-label { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
  .form-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1.5px solid #e0e0e0; font-size: 15px; background: #fff; color: #1a1a1a; }
  .form-input::placeholder { color: #bbb; }
  .form-select { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1.5px solid #e0e0e0; font-size: 15px; background: #fff; color: #1a1a1a; appearance: none; }

  .password-hint { font-size: 11px; color: #666; margin-top: 4px; }

  .btn-signup { display: block; width: 100%; padding: 16px; border-radius: 12px; border: none; background: #d4a843; color: #fff; font-size: 16px; font-weight: 700; text-align: center; margin-top: 20px; }

  /* Divider */
  .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
  .divider-line { flex: 1; height: 1px; background: #e0e0e0; }
  .divider-text { font-size: 12px; color: #666; font-weight: 500; }

  /* Social Buttons */
  .social-btns { display: flex; flex-direction: column; gap: 12px; }
  .btn-social { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #e0e0e0; background: #fff; font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .btn-social .social-icon { font-size: 18px; }
  .btn-social.apple { background: #000; color: #fff; border-color: #000; }

  /* Footer */
  .login-prompt { text-align: center; margin-top: 24px; font-size: 14px; color: #666; }
  .login-prompt a { color: #2a7d9c; font-weight: 600; text-decoration: none; }

  .legal { text-align: center; font-size: 11px; color: #bbb; margin-top: 16px; line-height: 1.5; }
  .legal a { color: #666; text-decoration: underline; }

  /* Field validation errors */
  .form-input.error { border-color: #ef4444; }
  .error-text { font-size: 12px; color: #ef4444; margin-top: 4px; display: none; }

  /* Error state */
  body.signup-error .form-input.error { border-color: #ef4444; }
  body.signup-error .error-text { display: block; }
</style>
</head>
<body>

<!-- State Switcher -->
<div class="state-switcher">
  <div class="sw-label">Sign Up</div>
  <div class="sw-pills">
    <button class="sw-pill active" onclick="setState('default')">Default</button>
    <button class="sw-pill" onclick="setState('error')">Validation Errors</button>
  </div>
</div>

<div class="status-bar">
  <span>9:41</span>
  <span style="font-size: 11px; font-weight: 400;">* * *</span>
</div>

<div class="top-nav">
  <a href="welcome.html" class="back">&larr;</a>
  <div class="title">Sign Up</div>
  <div class="spacer"></div>
</div>

<div class="content">

  <div class="logo-area">
    <div class="logo-crown"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm0 2h14v2H5v-2z"/></svg></div>
    <div class="logo-subtitle">Create your player profile</div>
  </div>

  <div class="social-btns">
    <button class="btn-social google" onclick="window.location.href='onboarding.html'">
      <span class="social-icon">G</span>
      Sign Up with Google
    </button>
    <button class="btn-social apple" onclick="window.location.href='onboarding.html'">
      <span class="social-icon">&#63743;</span>
      Sign Up with Apple
    </button>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">OR</span>
    <div class="divider-line"></div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <div class="form-label">First Name</div>
      <input class="form-input" type="text" placeholder="Patrick" />
    </div>
    <div class="form-group">
      <div class="form-label">Last Name</div>
      <input class="form-input" type="text" placeholder="Schwagler" />
    </div>
  </div>

  <div class="form-group">
    <div class="form-label">Email</div>
    <input class="form-input error" type="email" placeholder="you@example.com" />
    <div class="error-text">Please enter a valid email address.</div>
  </div>

  <div class="form-group">
    <div class="form-label">Password</div>
    <input class="form-input error" type="password" placeholder="Create a password" />
    <div class="password-hint">At least 8 characters</div>
    <div class="error-text">Password must be at least 8 characters.</div>
  </div>

  <button class="btn-signup" onclick="window.location.href='onboarding.html'">Create Account</button>

  <div class="login-prompt">
    Already have an account? <a href="login.html">Log In</a>
  </div>

  <div class="legal">By signing up, you agree to our<br/><a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></div>

</div>

<script>
  function setState(state) {
    document.body.classList.remove('signup-error');
    document.querySelectorAll('.sw-pill').forEach(p => p.classList.remove('active'));
    if (state === 'error') {
      document.body.classList.add('signup-error');
      document.querySelectorAll('.sw-pill')[1].classList.add('active');
    } else {
      document.querySelectorAll('.sw-pill')[0].classList.add('active');
    }
  }
</script>

<script src="dark-theme-toggle.js"></script>
</body>
</html>
