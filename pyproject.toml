# Shared Python tool config (e.g. Ruff). Run: ruff check apps/backend && ruff format --check apps/backend
[tool.ruff]
target-version = "py311"
line-length = 99

[tool.ruff.lint.per-file-ignores]
# Sub-router imports must come after shared limiter/constants setup
"apps/backend/api/routes/__init__.py" = ["E402"]
# Test files: unused variables are common in fixtures/setup
"apps/backend/tests/*" = ["F841"]

[tool.ruff.format]
quote-style = "double"
