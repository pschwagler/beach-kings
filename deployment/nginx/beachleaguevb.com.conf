# Nginx configuration for beachleaguevb.com
# Deploy: copy to /etc/nginx/sites-available/beachleaguevb.com
#         symlink to /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

# Rate limit zone — 30 requests/sec per IP, burst up to 60
limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;

# Conditional upgrade header: "upgrade" for WebSocket, "close" for regular HTTP
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP server — redirects to HTTPS (certbot manages the redirect)
server {
    listen 80;
    listen [::]:80;
    server_name beachleaguevb.com www.beachleaguevb.com;

    # Logging
    access_log /var/log/nginx/beachleaguevb.com.access.log;
    error_log /var/log/nginx/beachleaguevb.com.error.log;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name beachleaguevb.com www.beachleaguevb.com;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/beachleaguevb.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beachleaguevb.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Apply global rate limit
    limit_req zone=global burst=60 nodelay;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block common vulnerability scanner paths (drop connection silently)
    location ~* (\.php|\.env|\.git|/etc/passwd|/backup/|/bins?/|/vendor/|/wp-|/admin|/cgi-bin|/sdk|/webui|eval-stdin|\.aspx) {
        return 444;
    }

    # WebSocket endpoint — long-lived connections for real-time notifications
    location /api/ws/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # Proxy API requests to backend (FastAPI on port 8000)
    location /api/ {
        client_max_body_size 10m;
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;

        # Headers for FastAPI
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts (longer for photo uploads on mobile)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Proxy all other requests to frontend (Next.js on port 3000)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # Headers for Next.js
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support (Next.js HMR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Logging
    access_log /var/log/nginx/beachleaguevb.com.access.log;
    error_log /var/log/nginx/beachleaguevb.com.error.log;
}
